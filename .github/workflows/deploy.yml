name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同时只跑一个部署，慢构建 + 手动重派不打架
concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

# gh-pages 分支模式：只需 contents: write 即可推分支
# 不再用 actions/deploy-pages 的 artifact API
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # GitHub Pages 子路径：/Personal-Resume/
          VITE_BASE: /Personal-Resume/
        run: npm run build

      - name: Disable Jekyll processing
        # 让 GitHub Pages 把以 _ 开头的文件当静态资源（当前项目未用到，防御性加）
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # 单 commit 替换：gh-pages 分支不会随时间膨胀
          force_orphan: true
          keep_files: false
          enable_jekyll: false
