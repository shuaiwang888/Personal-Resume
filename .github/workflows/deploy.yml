name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # 注意：故意不监听 pull_request，避免 PR 触发 GITHUB_TOKEN 写入

# 同时只跑一个部署，慢构建 + 手动重派不打架
concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

# 最小权限：job 默认 read-all，单独开 contents: write 给 deploy 用
# 这样 checkout 等 step 不会拿到任何额外权限
permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 只在这个 job 内显式开写权限（peaceiris push 用）
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 不缓存凭证，step 完成后立即丢弃

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # GitHub Pages 子路径：/Personal-Resume/
          VITE_BASE: /Personal-Resume/
          # 联系方式（从 Repository secrets 注入；本地 dev 用 .env.local）
          VITE_PUBLIC_EMAIL: ${{ secrets.VITE_PUBLIC_EMAIL }}
          VITE_PUBLIC_PHONE: ${{ secrets.VITE_PUBLIC_PHONE }}
          # 访问统计后端（HF Space）。本地 dev 留空 = 关闭埋点。
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: Disable Jekyll processing
        # 让 GitHub Pages 把以 _ 开头的文件当静态资源（当前项目未用到，防御性加）
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # 单 commit 替换：gh-pages 分支不会随时间膨胀
          force_orphan: true
          keep_files: false
          enable_jekyll: false
