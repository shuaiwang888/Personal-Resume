<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0B" />
    <meta
      name="description"
      content="王帅 · AI 产品经理（金融大模型方向）。从后端架构到 AI 产品落地，把工程深度转化为金融智能的产品价值。"
    />
    <meta name="author" content="王帅" />
    <meta name="keywords" content="AI 产品经理, 金融大模型, RAG, AI Agent, 产品负责人, 王帅" />

    <!--
      安全 meta 标签（防 XSS / 防信息泄露 / 限制危险 API）
      - Content-Security-Policy: 限制脚本/样式/字体/图片来源
        * 'self' 只允许本站资源
        * fonts.googleapis.com / fonts.gstatic.com: 字体 CDN
        * 'unsafe-inline' (style): Vite 注入的 inline style 必需
        * 'unsafe-eval' (script): ogl WebGL 库可能用到
        * data: / blob: 内联资源（头像、canvas）
      - Referrer-Policy: 严格 origin（防 referer 泄露完整 URL）
      - X-Content-Type-Options: nosniff 防止 MIME 嗅探
      - Permissions-Policy: 关闭摄像头/麦克风/地理定位/支付等
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com data:;
               img-src 'self' data: blob: https:;
               connect-src 'self' https://appstoreqaq-personal-resume.hf.space;
               frame-ancestors 'none';
               base-uri 'self';
               form-action 'self';
               object-src 'none';"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Permissions-Policy"
      content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="王帅 · AI 产品经理 · 金融大模型" />
    <meta
      property="og:description"
      content="从后端架构到 AI 产品落地，主导 4 款 AI 产品在军工/政企/航运场景完成商业化验证。"
    />
    <meta property="og:locale" content="zh_CN" />

    <!-- Google Fonts：预连接 + 预加载 CSS，让字体与 JS 并行下载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <title>王帅 · AI 产品经理 · 金融大模型</title>
  </head>
