<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1410"/>
      <stop offset="50%" stop-color="#0A0A0B"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#7CFFC4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7CFFC4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#9B8CFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9B8CFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid1" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg1)"/>
  <rect width="1600" height="900" fill="url(#grid1)"/>
  <rect width="1600" height="900" fill="url(#orb1)"/>
  <rect width="1600" height="900" fill="url(#orb2)"/>

  <!-- 装饰：数据柱 -->
  <g opacity="0.8">
    <rect x="180" y="520" width="36" height="220" rx="6" fill="#7CFFC4" fill-opacity="0.18"/>
    <rect x="240" y="460" width="36" height="280" rx="6" fill="#7CFFC4" fill-opacity="0.32"/>
    <rect x="300" y="500" width="36" height="240" rx="6" fill="#7CFFC4" fill-opacity="0.22"/>
    <rect x="360" y="380" width="36" height="360" rx="6" fill="#7CFFC4" fill-opacity="0.55"/>
    <rect x="420" y="320" width="36" height="420" rx="6" fill="#7CFFC4" fill-opacity="0.7"/>
    <rect x="480" y="240" width="36" height="500" rx="6" fill="#7CFFC4"/>
    <rect x="540" y="280" width="36" height="460" rx="6" fill="#7CFFC4" fill-opacity="0.6"/>
  </g>

  <!-- 折线 -->
  <polyline points="200,400 320,350 440,420 560,300 680,380 800,260 920,340 1040,220 1160,300 1280,180 1400,240"
            fill="none" stroke="#7CFFC4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <g fill="#7CFFC4">
    <circle cx="200" cy="400" r="5"/>
    <circle cx="320" cy="350" r="5"/>
    <circle cx="440" cy="420" r="5"/>
    <circle cx="560" cy="300" r="5"/>
    <circle cx="680" cy="380" r="5"/>
    <circle cx="800" cy="260" r="5"/>
    <circle cx="920" cy="340" r="5"/>
    <circle cx="1040" cy="220" r="5"/>
    <circle cx="1160" cy="300" r="5"/>
    <circle cx="1280" cy="180" r="5"/>
    <circle cx="1400" cy="240" r="5"/>
  </g>

  <!-- 右侧对话框 -->
  <g transform="translate(1080, 540)">
    <rect x="0" y="0" width="380" height="120" rx="16" fill="rgba(124,255,196,0.08)" stroke="rgba(124,255,196,0.4)"/>
    <circle cx="28" cy="60" r="8" fill="#7CFFC4"/>
    <rect x="50" y="36" width="280" height="8" rx="4" fill="#7CFFC4" fill-opacity="0.7"/>
    <rect x="50" y="56" width="220" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
    <rect x="50" y="76" width="180" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- 标题 -->
  <text x="180" y="180" font-family="ui-sans-serif, system-ui" font-size="56" font-weight="700" fill="#F5F5F7">ChatBI</text>
  <text x="180" y="230" font-family="ui-monospace, monospace" font-size="18" fill="rgba(124,255,196,0.7)" letter-spacing="2">AIGC · BUSINESS INTELLIGENCE</text>
</svg>
