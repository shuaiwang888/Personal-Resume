<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0a0e"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </linearGradient>
    <radialGradient id="orb4" cx="20%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#7CFFC4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7CFFC4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb4b" cx="80%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#9B8CFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9B8CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg4)"/>
  <rect width="1600" height="900" fill="url(#orb4)"/>
  <rect width="1600" height="900" fill="url(#orb4b)"/>

  <!-- 文档堆叠 -->
  <g transform="translate(180 200)">
    <rect x="40" y="40" width="280" height="360" rx="12" fill="rgba(124,255,196,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <rect x="20" y="20" width="280" height="360" rx="12" fill="rgba(124,255,196,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <rect width="280" height="360" rx="12" fill="#111114" stroke="rgba(124,255,196,0.3)"/>
    <text x="20" y="40" font-family="ui-monospace" font-size="11" fill="rgba(124,255,196,0.8)">DOC · 00342</text>
    <line x1="20" y1="60" x2="260" y2="60" stroke="rgba(255,255,255,0.1)"/>
    <rect x="20" y="80" width="180" height="10" rx="3" fill="rgba(255,255,255,0.6)"/>
    <rect x="20" y="100" width="220" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="114" width="200" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="128" width="160" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="156" width="240" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="170" width="180" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="184" width="220" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="212" width="140" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="226" width="200" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="254" width="240" height="50" rx="6" fill="rgba(124,255,196,0.1)" stroke="rgba(124,255,196,0.3)"/>
    <text x="32" y="282" font-family="ui-monospace" font-size="11" fill="#7CFFC4">关键词命中</text>
    <text x="32" y="298" font-family="ui-sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">「目标海域 巡逻路线」</text>
  </g>

  <!-- 检索流程 -->
  <g transform="translate(560 350)">
    <text font-family="ui-monospace" font-size="12" fill="rgba(124,255,196,0.8)">HYBRID RETRIEVAL</text>
    <!-- ES 节点 -->
    <g transform="translate(0 30)">
      <rect width="140" height="60" rx="10" fill="rgba(124,255,196,0.08)" stroke="rgba(124,255,196,0.3)"/>
      <text x="14" y="26" font-family="ui-sans-serif" font-size="14" fill="#F5F5F7">ElasticSearch</text>
      <text x="14" y="44" font-family="ui-monospace" font-size="10" fill="rgba(255,255,255,0.4)">关键词检索</text>
    </g>
    <!-- FAISS 节点 -->
    <g transform="translate(160 30)">
      <rect width="140" height="60" rx="10" fill="rgba(155,140,255,0.08)" stroke="rgba(155,140,255,0.3)"/>
      <text x="14" y="26" font-family="ui-sans-serif" font-size="14" fill="#F5F5F7">FAISS</text>
      <text x="14" y="44" font-family="ui-monospace" font-size="10" fill="rgba(255,255,255,0.4)">向量语义</text>
    </g>
    <!-- LLM -->
    <g transform="translate(330 30)">
      <rect width="160" height="60" rx="10" fill="rgba(124,255,196,0.15)" stroke="rgba(124,255,196,0.5)"/>
      <text x="14" y="26" font-family="ui-sans-serif" font-size="14" fill="#7CFFC4" font-weight="600">LLM 合成</text>
      <text x="14" y="44" font-family="ui-monospace" font-size="10" fill="rgba(255,255,255,0.5)">LangChain</text>
    </g>
    <!-- 连线 -->
    <g stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none">
      <path d="M 0 0 L 0 25"/>
      <path d="M 140 0 L 160 25"/>
      <path d="M 70 60 L 70 110"/>
      <path d="M 230 60 L 230 110"/>
      <path d="M 70 110 L 410 110 L 410 95"/>
    </g>
  </g>

  <!-- 右侧回答卡 -->
  <g transform="translate(1080 220)">
    <rect width="440" height="460" rx="20" fill="#111114" stroke="rgba(124,255,196,0.3)"/>
    <g transform="translate(24 28)">
      <circle r="14" cx="14" cy="14" fill="#7CFFC4"/>
      <text x="38" y="20" font-family="ui-sans-serif" font-size="14" fill="#F5F5F7" font-weight="600">情报助手</text>
    </g>
    <line x1="24" y1="64" x2="416" y2="64" stroke="rgba(255,255,255,0.1)"/>
    <g transform="translate(24 88)">
      <rect width="392" height="56" rx="10" fill="rgba(124,255,196,0.06)"/>
      <text x="16" y="22" font-family="ui-sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">请简述近 30 天南海</text>
      <text x="16" y="42" font-family="ui-sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">某海域的巡逻频次与异常事件</text>
    </g>
    <g transform="translate(24 168)">
      <rect width="392" height="260" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>
      <text x="16" y="28" font-family="ui-sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">根据检索到的 32 份情报文档，</text>
      <text x="16" y="50" font-family="ui-sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">该海域近 30 天巡逻频次...</text>
      <text x="16" y="78" font-family="ui-sans-serif" font-size="11" fill="rgba(124,255,196,0.7)">▎ 引用 4 条情报</text>
      <text x="16" y="100" font-family="ui-sans-serif" font-size="11" fill="rgba(124,255,196,0.7)">▎ 准确率 93%+</text>
      <text x="16" y="122" font-family="ui-sans-serif" font-size="11" fill="rgba(124,255,196,0.7)">▎ 响应时间 2-3s</text>
      <rect x="16" y="200" width="120" height="32" rx="6" fill="rgba(124,255,196,0.1)" stroke="rgba(124,255,196,0.3)"/>
      <text x="76" y="220" text-anchor="middle" font-family="ui-sans-serif" font-size="12" fill="#7CFFC4">查看原文</text>
    </g>
  </g>

  <!-- 标题 -->
  <text x="180" y="160" font-family="ui-sans-serif" font-size="56" font-weight="700" fill="#F5F5F7">Intel QA</text>
  <text x="180" y="700" font-family="ui-monospace, monospace" font-size="18" fill="rgba(124,255,196,0.7)" letter-spacing="2">RAG · ES · FAISS</text>
</svg>
