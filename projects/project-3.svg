<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1010"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </linearGradient>
    <radialGradient id="orb3" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#3DDC97" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3DDC97" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid3" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg3)"/>
  <rect width="1600" height="900" fill="url(#grid3)"/>
  <rect width="1600" height="900" fill="url(#orb3)"/>

  <!-- 多机协同路径 -->
  <g fill="none" stroke-width="2" opacity="0.6">
    <path d="M 200 700 Q 500 600 800 480 T 1400 280" stroke="#3DDC97" stroke-dasharray="6 4"/>
    <path d="M 200 700 Q 600 400 900 380 T 1400 280" stroke="#7CFFC4" stroke-dasharray="6 4"/>
    <path d="M 200 700 Q 700 550 1000 320 T 1400 280" stroke="#9B8CFF" stroke-dasharray="6 4"/>
  </g>

  <!-- 障碍物 -->
  <g>
    <circle cx="600" cy="520" r="20" fill="rgba(239,68,68,0.3)" stroke="#EF4444" stroke-width="2"/>
    <text x="600" y="528" text-anchor="middle" font-family="ui-sans-serif" font-size="20" fill="#EF4444">×</text>
    <circle cx="1050" cy="450" r="20" fill="rgba(239,68,68,0.3)" stroke="#EF4444" stroke-width="2"/>
    <text x="1050" y="458" text-anchor="middle" font-family="ui-sans-serif" font-size="20" fill="#EF4444">×</text>
    <circle cx="1250" cy="400" r="20" fill="rgba(239,68,68,0.3)" stroke="#EF4444" stroke-width="2"/>
    <text x="1250" y="408" text-anchor="middle" font-family="ui-sans-serif" font-size="20" fill="#EF4444">×</text>
  </g>

  <!-- 无人机 -->
  <g transform="translate(200 700)">
    <circle r="18" fill="#3DDC97"/>
    <circle r="34" fill="none" stroke="#3DDC97" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="3 3"/>
    <text y="6" text-anchor="middle" font-family="ui-monospace" font-size="12" fill="#0A0A0B" font-weight="700">U1</text>
  </g>
  <g transform="translate(800 480)">
    <circle r="18" fill="#7CFFC4"/>
    <circle r="34" fill="none" stroke="#7CFFC4" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="3 3"/>
    <text y="6" text-anchor="middle" font-family="ui-monospace" font-size="12" fill="#0A0A0B" font-weight="700">U2</text>
  </g>
  <g transform="translate(1100 350)">
    <circle r="18" fill="#9B8CFF"/>
    <circle r="34" fill="none" stroke="#9B8CFF" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="3 3"/>
    <text y="6" text-anchor="middle" font-family="ui-monospace" font-size="12" fill="#0A0A0B" font-weight="700">U3</text>
  </g>
  <!-- 目标 -->
  <g transform="translate(1400 280)">
    <rect x="-30" y="-30" width="60" height="60" rx="8" fill="none" stroke="#7CFFC4" stroke-width="3" stroke-dasharray="4 4"/>
    <circle r="10" fill="#7CFFC4"/>
  </g>

  <!-- LLM 大脑模块 -->
  <g transform="translate(80 100)">
    <rect width="280" height="140" rx="16" fill="rgba(124,255,196,0.06)" stroke="rgba(124,255,196,0.3)"/>
    <text x="20" y="40" font-family="ui-monospace" font-size="13" fill="rgba(124,255,196,0.8)">LLM · TASK BRAIN</text>
    <text x="20" y="72" font-family="ui-sans-serif" font-size="16" font-weight="600" fill="#F5F5F7">协同侦察任务</text>
    <text x="20" y="98" font-family="ui-sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">规划: 3 UAVs</text>
    <text x="20" y="118" font-family="ui-sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">模式: 自适应避障</text>
  </g>

  <!-- 标题 -->
  <text x="80" y="320" font-family="ui-sans-serif" font-size="56" font-weight="700" fill="#F5F5F7">UAV Swarm</text>
  <text x="80" y="370" font-family="ui-monospace, monospace" font-size="18" fill="rgba(124,255,196,0.7)" letter-spacing="2">LLM · VLM · AUTONOMY</text>
</svg>
